<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Тренажёр агента недвижимости</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f39c12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Агент Недв">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- Иконки для iOS и Android -->
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/steps.css">
    <link rel="stylesheet" href="css/drawer.css">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- API Яндекс.Карт -->
    <script src="https://api-maps.yandex.ru/2.1/?apikey=7d7f69f2-30f1-4a3c-93bd-b7b99354b7c5&lang=ru_RU"></script>
    
    <style>
        /* Временные стили для нового интерфейса — будут перенесены в base.css */
        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .xp-card {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        
        .xp-card__stats {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .xp-card__level {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        
        .xp-card__xp {
            font-size: 0.85rem;
            font-weight: 600;
            color: #f39c12;
        }
        
        .level-progress {
            width: 120px;
            height: 4px;
            background: var(--color-border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .level-progress__fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e67e22);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }
        
        .user-name {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 32px;
            background: var(--color-bg);
            transition: all 0.2s ease;
        }
        
        .user-name:hover {
            background: var(--color-border);
        }
        
        .user-name__avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
        }
        
        .user-name__text {
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        /* Герой-блок "Продолжить обучение" */
        .continue-learning {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border-radius: var(--radius);
            margin: 0 24px 24px 24px;
            padding: 24px 28px;
            color: white;
            display: none;
            position: relative;
            overflow: hidden;
        }
        
        .continue-learning--visible {
            display: block;
        }
        
        .continue-learning::before {
            content: '✨';
            position: absolute;
            right: 20px;
            bottom: 10px;
            font-size: 80px;
            opacity: 0.1;
            pointer-events: none;
        }
        
        .continue-learning__greeting {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .continue-learning__sub {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 20px;
        }
        
        .continue-learning__card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .continue-learning__card:hover {
            transform: translateX(4px);
            background: rgba(255,255,255,0.25);
        }
        
        .continue-learning__info h4 {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        
        .continue-learning__info p {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        .continue-learning__progress {
            min-width: 200px;
        }
        
        .continue-learning__progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        
        .continue-learning__progress-fill {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 0%;
        }
        
        .continue-learning__progress-text {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        
        .continue-learning__btn {
            background: white;
            color: #e67e22;
            border: none;
            padding: 8px 20px;
            border-radius: 32px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .continue-learning__btn:hover {
            transform: scale(1.02);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* Оранжевый акцент на табах */
        .category-tabs {
            display: flex;
            gap: 8px;
            margin: 0 24px 24px 24px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 12px;
        }
        
        .category-tab {
            padding: 8px 20px;
            border-radius: 32px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: var(--color-text-light);
        }
        
        .category-tab:hover {
            background: var(--color-bg);
        }
        
        .category-tab--active {
            background: #f39c12;
            color: white;
        }
        
        @media (max-width: 768px) {
            .header-right {
                gap: 10px;
            }
            .xp-card__stats {
                gap: 6px;
            }
            .level-progress {
                width: 80px;
            }
            .user-name__text {
                display: none;
            }
            .continue-learning {
                margin: 0 16px 16px 16px;
                padding: 16px 20px;
            }
            .continue-learning__greeting {
                font-size: 1.2rem;
            }
            .continue-learning__card {
                flex-direction: column;
                align-items: stretch;
            }
            .category-tabs {
                margin: 0 16px 16px 16px;
                gap: 4px;
            }
            .category-tab {
                padding: 6px 14px;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title"><i class="fas fa-building"></i> Тренажёр агента недвижимости</h1>
            
            <!-- Скрытый элемент для обратной совместимости с app.js -->
            <div class="header__info" id="header-info" style="display: none;"></div>
            
            <div class="header-right">
                <div class="xp-card" id="xp-card" style="display: none;">
                    <div class="xp-card__stats">
                        <span class="xp-card__level" id="user-level">Уровень 1</span>
                        <span class="xp-card__xp" id="user-xp">0 XP</span>
                    </div>
                    <div class="level-progress" id="level-progress">
                        <div class="level-progress__fill" id="level-progress-fill"></div>
                    </div>
                </div>
                
                <div class="user-name" id="user-name-btn" style="display: none;">
                    <div class="user-name__avatar" id="user-avatar"></div>
                    <span class="user-name__text" id="user-name-text"></span>
                    <i class="fas fa-chevron-down" style="font-size: 0.7rem; opacity: 0.6;"></i>
                </div>
            </div>
        </header>

        <main class="main">
            <!-- Экран выбора сценария -->
            <section class="screen" id="scenario-screen">
                <!-- Герой-блок "Продолжить обучение" -->
                <div class="continue-learning" id="continue-learning">
                    <div class="continue-learning__greeting" id="continue-greeting">👋 Добро пожаловать!</div>
                    <div class="continue-learning__sub" id="continue-sub">Продолжите с того места, где остановились</div>
                    <div class="continue-learning__card" id="continue-card">
                        <div class="continue-learning__info">
                            <h4 id="continue-title">Загрузка...</h4>
                            <p id="continue-desc"></p>
                        </div>
                        <div class="continue-learning__progress">
                            <div class="continue-learning__progress-bar">
                                <div class="continue-learning__progress-fill" id="continue-progress-fill"></div>
                            </div>
                            <div class="continue-learning__progress-text" id="continue-progress-text">0% завершено</div>
                        </div>
                        <button class="continue-learning__btn" id="continue-btn">Продолжить →</button>
                    </div>
                </div>
                
                <!-- Табы категорий -->
                <div class="category-tabs" id="category-tabs">
                    <button class="category-tab category-tab--active" data-category="all">Все</button>
                </div>
                
                <div class="scenarios-grid" id="scenarios-grid"></div>
            </section>

            <!-- Экран карты -->
            <section class="screen hidden" id="map-screen">
                <div class="step-header">
                    <button class="btn btn--small btn--secondary" id="back-to-scenarios-btn"><i class="fas fa-arrow-left"></i> К сценариям</button>
                    <h2 class="step-title" id="map-step-title"></h2>
                    <div class="step-counter" id="map-step-counter"></div>
                </div>
                
                <div class="main main--map">
                    <!-- Левая панель со списком ЖК (для ПК) -->
                    <div class="jk-drawer" id="jk-drawer">
                        <div class="jk-drawer__header">
                            <h3 class="jk-drawer__title"><i class="fas fa-list"></i> Жилые комплексы</h3>
                            <button class="jk-drawer__close" id="drawer-close-btn"><i class="fas fa-times"></i></button>
                        </div>
                        <ul class="jk-drawer__list" id="jk-drawer-list"></ul>
                        <div class="jk-drawer__actions">
                            <button class="btn btn--secondary btn--small" id="hint-btn"><i class="fas fa-lightbulb"></i> Подсказка</button>
                            <button class="btn btn--danger btn--small" id="reset-step-btn"><i class="fas fa-undo-alt"></i> Сбросить шаг</button>
                        </div>
                    </div>
                    
                    <!-- Оверлей для мобильной панели -->
                    <div class="drawer-overlay" id="drawer-overlay"></div>
                    
                    <!-- Плавающая кнопка для открытия списка на мобильных -->
                    <button class="floating-list-btn" id="floating-list-btn">
                        <i class="fas fa-building"></i>
                    </button>
                    
                    <section class="map-section">
                        <div class="map-container" id="map"></div>
                        <div class="map-progress" id="map-progress" style="display: none;">
                            <i class="fas fa-map-pin"></i> Расставлено: <span class="map-progress__count" id="map-progress-count">0</span> 
                            из <span id="map-progress-total">0</span>
                            <div class="map-progress__fill"></div>
                        </div>
                        <p class="map-hint"><i class="fas fa-map-marker-alt"></i> Нажмите на ЖК в списке, затем на карту, чтобы поставить метку</p>
                    </section>
                </div>
            </section>

            <!-- Экран тестов и интерактивов -->
            <section class="screen hidden" id="quiz-screen">
                <div class="step-header">
                    <button class="btn btn--small btn--secondary" id="quiz-back-btn"><i class="fas fa-arrow-left"></i> К сценариям</button>
                    <h2 class="step-title" id="quiz-step-title"></h2>
                    <div class="step-counter" id="quiz-step-counter"></div>
                </div>
                <div class="quiz-container" id="quiz-container"></div>
                <div class="quiz-actions" style="text-align:center; padding:20px;">
                    <button class="btn btn--primary" id="quiz-next-btn" disabled>Далее</button>
                </div>
            </section>

            <!-- Экран сквозного сценария "Путь клиента" -->
            <section class="screen hidden" id="client-journey-screen">
                <div class="step-header">
                    <button class="btn btn--small btn--secondary" id="journey-back-btn"><i class="fas fa-arrow-left"></i> К сценариям</button>
                    <h2 class="step-title" id="journey-step-title"></h2>
                    <div class="step-counter" id="journey-step-counter"></div>
                </div>
                <div class="journey-container" id="journey-container"></div>
                <div class="journey-actions" style="text-align:center; padding:20px;">
                    <button class="btn btn--primary hidden" id="journey-next-btn" disabled>Далее</button>
                </div>
            </section>

            <!-- Экран финиша -->
            <section class="screen hidden" id="finish-screen">
                <div class="finish-content">
                    <div class="finish__icon"><i class="fas fa-flag-checkered"></i></div>
                    <h2 class="finish__title">Сценарий пройден</h2>
                    <p class="finish__text" id="finish-text"></p>
                    <div class="finish__stats" id="finish-stats"></div>
                    <div class="finish__actions">
                        <button class="btn btn--primary" id="finish-restart-btn"><i class="fas fa-redo-alt"></i> Пройти заново</button>
                        <button class="btn btn--secondary" id="finish-scenarios-btn"><i class="fas fa-th-large"></i> К списку сценариев</button>
                    </div>
                </div>
            </section>
        </main>

        <div class="toast hidden" id="toast">
            <span class="toast__icon" id="toast-icon"></span>
            <span class="toast__message" id="toast-message"></span>
        </div>
    </div>

    <!-- СКРИПТЫ -->
    <script src="js/config.js"></script>
    <script src="js/store.js"></script>
    
    <!-- УТИЛИТЫ -->
    <script src="js/utils/escape.js"></script>
    <script src="js/utils/toast.js"></script>
    <script src="js/utils/logger.js"></script>
    
    <script src="js/templates/ui-templates.js"></script>
    <script src="js/templates/quiz-templates.js"></script>
    <script src="js/templates/map-templates.js"></script>
    <script src="js/templates/client-journey-templates.js"></script>
    <script src="js/templates/interactive-templates.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/badges.js"></script>
    <script src="js/user.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/brief.js"></script>
    <script src="js/interactive-lesson1.js"></script>
    <script src="js/client-journey.js"></script>
    <script src="js/drawer.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/map/map-core.js"></script>
    <script src="js/map/map-utils.js"></script>
    <script src="js/map/map-ui.js"></script>
    <script src="js/map/map-step.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/timer-quiz.js"></script>
    <script src="js/decision-chain.js"></script>
    <script src="js/interactive.js"></script>
    
    <!-- НОВЫЕ ФАЙЛЫ ДЛЯ РЕЕСТРА ШАГОВ -->
    <script src="js/stepRegistry.js"></script>
    <script src="js/stepRegistry-init.js"></script>
    
    <script src="js/app.js"></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker зарегистрирован:', registration.scope);
                    })
                    .catch(error => {
                        console.error('Ошибка регистрации Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
