<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр агента недвижимости</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/steps.css">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <h1 class="header__title">🏙️ Тренажёр агента недвижимости</h1>
            <div class="header__info" id="header-info"></div>
        </header>

        <!-- Основной контент -->
        <main class="main">
            <!-- Экран выбора сценария -->
            <section class="screen" id="scenario-screen">
                <h2 class="screen__title">Выберите сценарий обучения</h2>
                <div class="scenarios-grid" id="scenarios-grid">
                    <!-- Заполняется из JS -->
                </div>
            </section>

            <!-- Экран шага (карта) -->
            <section class="screen hidden" id="map-screen">
                <div class="step-header">
                    <button class="btn btn--small btn--secondary" id="back-to-scenarios-btn">← К сценариям</button>
                    <h2 class="step-title" id="map-step-title"></h2>
                    <div class="step-counter" id="map-step-counter"></div>
                </div>
                <div class="main main--map">
                    <aside class="sidebar" id="sidebar">
                        <h3 class="sidebar__title">Жилые комплексы</h3>
                        <ul class="jk-list" id="jk-list"></ul>
                        <div class="sidebar__actions">
                            <button class="btn btn--secondary" id="hint-btn" disabled>💡 Подсказка</button>
                            <button class="btn btn--danger" id="reset-step-btn">🔄 Сбросить шаг</button>
                        </div>
                    </aside>
                    <section class="map-section">
                        <div class="map-container" id="map"></div>
                        <p class="map-hint">Выберите ЖК из списка слева, затем кликните на карту</p>
                    </section>
                </div>
            </section>

            <!-- Экран шага (викторина) -->
            <section class="screen hidden" id="quiz-screen">
                <div class="step-header">
                    <button class="btn btn--small btn--secondary" id="quiz-back-btn">← К сценариям</button>
                    <h2 class="step-title" id="quiz-step-title"></h2>
                    <div class="step-counter" id="quiz-step-counter"></div>
                </div>
                <div class="quiz-container" id="quiz-container">
                    <!-- Заполняется из JS -->
                </div>
                <div class="quiz-actions">
                    <button class="btn btn--primary" id="quiz-next-btn" disabled>Далее</button>
                </div>
            </section>

            <!-- Экран завершения сценария -->
            <section class="screen hidden" id="finish-screen">
                <div class="finish-content">
                    <h2 class="finish__title">🎉 Сценарий пройден!</h2>
                    <p class="finish__text" id="finish-text"></p>
                    <div class="finish__stats" id="finish-stats"></div>
                    <div class="finish__actions">
                        <button class="btn btn--primary" id="finish-restart-btn">Пройти заново</button>
                        <button class="btn btn--secondary" id="finish-scenarios-btn">К списку сценариев</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Тосты -->
        <div class="toast hidden" id="toast">
            <span class="toast__icon" id="toast-icon"></span>
            <span class="toast__message" id="toast-message"></span>
        </div>
    </div>

    <script src="js/dragdrop.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/dragdrop.js"></script>
    <script src="js/badges.js"></script>
    <script src="js/progress.js"></script>
    <script src="js/brief.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
