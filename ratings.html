<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Рейтинги — Тренажёр агента недвижимости</title>
    
    <!-- PWA Meta -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2e86de">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Агент Недв">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Агент Недв">
    
    <!-- iOS иконки -->
    <link rel="apple-touch-icon" sizes="57x57" href="icons/icon-57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icons/icon-60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icons/icon-72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icons/icon-76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icons/icon-114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
    
    <!-- Android иконки -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
    
    <!-- Стили -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        /* ===== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ СТРАНИЦЫ РЕЙТИНГА ===== */
        .ratings-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .ratings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--color-border);
        }
        
        .ratings-header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .ratings-header h1 i {
            color: var(--color-warning);
        }
        
        .back-btn {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        /* ===== ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ В РЕЙТИНГЕ ===== */
        .user-rank-profile {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: var(--radius);
            padding: 24px 32px;
            margin-bottom: 32px;
            color: #fff;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .user-rank-profile--visible {
            display: flex;
        }
        
        .user-rank-profile__info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-rank-profile__avatar {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--color-warning), #e67e22);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }
        
        .user-rank-profile__name {
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .user-rank-profile__place {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .user-rank-profile__stats {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }
        
        .user-rank-profile__stat {
            text-align: center;
        }
        
        .user-rank-profile__stat-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-warning);
            display: block;
        }
        
        .user-rank-profile__stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        /* ===== СТАТИСТИКА ===== */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--color-surface);
            border-radius: var(--radius);
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px var(--color-shadow);
            border: 1px solid var(--color-border);
            transition: all var(--transition);
        }
        
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--color-shadow);
        }
        
        .stat-card__value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .stat-card__value--gold {
            color: var(--color-warning);
        }
        
        .stat-card__label {
            font-size: 0.8rem;
            color: var(--color-text-light);
            margin-top: 4px;
        }
        
        /* ===== ТАБЛИЦА ЛИДЕРОВ ===== */
        .leaderboard-wrapper {
            background: var(--color-surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 2px 8px var(--color-shadow);
            border: 1px solid var(--color-border);
        }
        
        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--color-border);
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .leaderboard-header__title {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .leaderboard-header__actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .refresh-btn {
            padding: 8px 16px;
            min-height: var(--tap-target-size);
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            transition: all var(--transition);
            color: var(--color-text);
        }
        
        .refresh-btn:hover {
            background: var(--color-border);
        }
        
        .refresh-btn:active {
            transform: scale(0.96);
        }
        
        .refresh-btn--spinning i {
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* ===== ТАБЛИЦА ===== */
        .table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        th {
            background: var(--color-bg);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--color-text-light);
            border-bottom: 2px solid var(--color-border);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text);
            font-size: 0.9rem;
            vertical-align: middle;
        }
        
        /* Строка текущего пользователя */
        tr.user-row {
            background: #eaf2fd !important;
            border-left: 3px solid var(--color-primary);
        }
        
        tr.user-row td {
            font-weight: 600;
        }
        
        tr.user-row .rank-cell {
            position: relative;
        }
        
        tr.user-row .rank-cell::after {
            content: '👤';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem;
        }
        
        tr:hover {
            background: var(--color-bg);
        }
        
        tr.user-row:hover {
            background: #e0edfe !important;
        }
        
        /* ===== РАНГИ ===== */
        .rank-cell {
            font-weight: 700;
            width: 60px;
            text-align: center;
        }
        
        .rank-medal {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: 700;
        }
        
        .rank-medal--1 {
            background: linear-gradient(135deg, #ffd700, #f5a623);
            color: #fff;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }
        
        .rank-medal--2 {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #fff;
            box-shadow: 0 2px 8px rgba(192, 192, 192, 0.4);
        }
        
        .rank-medal--3 {
            background: linear-gradient(135deg, #cd7f32, #b8692a);
            color: #fff;
            box-shadow: 0 2px 8px rgba(205, 127, 50, 0.4);
        }
        
        .rank-medal--other {
            background: var(--color-border);
            color: var(--color-text);
            width: 32px;
            height: 32px;
            font-size: 0.85rem;
        }
        
        /* ===== ПРОГРЕСС-БАР В ТАБЛИЦЕ ===== */
        .progress-cell {
            min-width: 120px;
        }
        
        .progress-bar-mini {
            height: 6px;
            background: var(--color-border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
            max-width: 120px;
        }
        
        .progress-bar-mini__fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-success));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .percent-badge {
            background: var(--color-success);
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .percent-badge--low {
            background: var(--color-warning);
        }
        
        /* ===== СОСТОЯНИЯ ===== */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-light);
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            display: block;
            margin-bottom: 16px;
        }
        
        .error-message {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-danger);
        }
        
        .error-message i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
        }
        
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--color-text-light);
        }
        
        .empty-message i {
            font-size: 3rem;
            display: block;
            margin-bottom: 16px;
            opacity: 0.4;
        }
        
        .empty-message .btn {
            margin-top: 16px;
        }
        
        .last-updated {
            font-size: 0.75rem;
            color: var(--color-text-light);
            text-align: center;
            padding: 12px;
            border-top: 1px solid var(--color-border);
        }
        
        /* ===== АДАПТИВ ===== */
        @media (max-width: 768px) {
            .ratings-container {
                padding: 16px;
            }
            
            .ratings-header h1 {
                font-size: 1.2rem;
            }
            
            .user-rank-profile {
                padding: 16px 20px;
                flex-direction: column;
                align-items: flex-start;
            }
            
            .user-rank-profile__stats {
                gap: 16px;
                width: 100%;
                justify-content: space-between;
            }
            
            .user-rank-profile__stat-value {
                font-size: 1.1rem;
            }
            
            .stats-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            .stat-card {
                padding: 12px 14px;
            }
            
            .stat-card__value {
                font-size: 1.3rem;
            }
            
            th, td {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
            
            .rank-medal {
                width: 30px;
                height: 30px;
                font-size: 1rem;
            }
            
            .progress-cell {
                min-width: 80px;
            }
            
            .leaderboard-header {
                padding: 12px 16px;
                flex-direction: column;
                align-items: stretch;
            }
            
            .leaderboard-header__actions {
                justify-content: flex-end;
            }
            
            table {
                min-width: 480px;
            }
            
            .hide-mobile {
                display: none;
            }
        }
        
        @media (max-width: 480px) {
            .stats-cards {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            
            .stat-card {
                padding: 10px 12px;
            }
            
            .stat-card__value {
                font-size: 1.1rem;
            }
            
            .stat-card__label {
                font-size: 0.7rem;
            }
            
            .user-rank-profile__info {
                flex-wrap: wrap;
            }
            
            .user-rank-profile__stats {
                gap: 12px;
            }
            
            .refresh-btn span {
                display: none;
            }
            
            .refresh-btn {
                padding: 8px 12px;
            }
        }
        
        /* Отключаем анимации для пользователей с vestibular disorders */
        @media (prefers-reduced-motion: reduce) {
            .refresh-btn--spinning i {
                animation: none;
            }
            .progress-bar-mini__fill {
                transition: none;
            }
            .stat-card:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title"><i class="fas fa-building"></i> Тренажёр агента недвижимости</h1>
            <div class="header__info"></div>
        </header>
        
        <main class="main">
            <div class="ratings-container">
                <!-- Шапка -->
                <div class="ratings-header">
                    <h1>
                        <i class="fas fa-trophy"></i>
                        Рейтинги специалистов
                    </h1>
                    <a href="./" class="btn btn--secondary back-btn">
                        <i class="fas fa-arrow-left"></i>
                        <span>На главную</span>
                    </a>
                </div>
                
                <!-- Профиль пользователя в рейтинге -->
                <div class="user-rank-profile" id="user-rank-profile">
                    <div class="user-rank-profile__info">
                        <div class="user-rank-profile__avatar" id="profile-avatar">👤</div>
                        <div>
                            <div class="user-rank-profile__name" id="profile-name">Агент</div>
                            <div class="user-rank-profile__place" id="profile-place">Место: —</div>
                        </div>
                    </div>
                    <div class="user-rank-profile__stats">
                        <div class="user-rank-profile__stat">
                            <span class="user-rank-profile__stat-value" id="profile-level">—</span>
                            <span class="user-rank-profile__stat-label">Уровень</span>
                        </div>
                        <div class="user-rank-profile__stat">
                            <span class="user-rank-profile__stat-value" id="profile-xp">—</span>
                            <span class="user-rank-profile__stat-label">XP</span>
                        </div>
                        <div class="user-rank-profile__stat">
                            <span class="user-rank-profile__stat-value" id="profile-percent">—%</span>
                            <span class="user-rank-profile__stat-label">Средний результат</span>
                        </div>
                        <div class="user-rank-profile__stat">
                            <span class="user-rank-profile__stat-value" id="profile-badges">—</span>
                            <span class="user-rank-profile__stat-label">Бейджей</span>
                        </div>
                    </div>
                </div>
                
                <!-- Статистика -->
                <div class="stats-cards" id="stats-cards" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-card__value" id="total-users">0</div>
                        <div class="stat-card__label">Всего участников</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__value" id="total-completed">0</div>
                        <div class="stat-card__label">Пройдено сценариев</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__value stat-card__value--gold" id="avg-percent">0%</div>
                        <div class="stat-card__label">Средний результат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__value" id="best-agent">—</div>
                        <div class="stat-card__label">Лучший агент</div>
                    </div>
                </div>
                
                <!-- Таблица лидеров -->
                <div class="leaderboard-wrapper">
                    <div class="leaderboard-header">
                        <div class="leaderboard-header__title">
                            <i class="fas fa-chart-line"></i>
                            Таблица лидеров
                        </div>
                        <div class="leaderboard-header__actions">
                            <button class="refresh-btn" id="refresh-btn">
                                <i class="fas fa-sync-alt"></i>
                                <span>Обновить</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="table-scroll" id="table-content">
                        <div class="loading">
                            <i class="fas fa-spinner"></i>
                            <p>Загрузка рейтингов...</p>
                        </div>
                    </div>
                    
                    <div class="last-updated" id="last-updated">
                        <i class="fas fa-clock"></i>
                        Данные обновлены: <span id="update-time">—</span>
                    </div>
                </div>
            </div>
        </main>
        
        <div class="toast hidden" id="toast">
            <span class="toast__icon" id="toast-icon"></span>
            <span class="toast__message" id="toast-message"></span>
        </div>
    </div>
    
    <!-- ===== ЕДИНЫЙ ЗАГРУЗЧИК ===== -->
    <script src="js/app-loader.js"></script>

    <!-- ===== СПЕЦИФИЧНЫЕ ДЛЯ СТРАНИЦЫ МОДУЛИ ===== -->
    <script src="js/config.js"></script>
    <script src="js/features/user.js"></script>
    <script src="js/features/badges.js"></script>
        <script>
        (function() {
            'use strict';
            
            let currentLeaderboard = [];
            let currentUserName = null;
            let isInitialized = false;

            // ===== ПОЛУЧЕНИЕ ДАННЫХ ПОЛЬЗОВАТЕЛЯ =====
            function getUserData() {
                const user = User.get();
                if (user) {
                    currentUserName = user.name;
                    return user;
                }
                return null;
            }
            
            // ===== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =====
            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            // ===== ЗАГРУЗКА РЕЙТИНГОВ =====
            async function loadLeaderboard() {
                const tableContent = document.getElementById('table-content');
                const refreshBtn = document.getElementById('refresh-btn');
                
                // Показываем спиннер на кнопке
                refreshBtn.classList.add('refresh-btn--spinning');
                
                tableContent.innerHTML = `
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                        <p>Загрузка рейтингов...</p>
                    </div>
                `;
                
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaderboard`);
                    const data = await response.json();
                    
                    if (data.error) {
                        tableContent.innerHTML = `
                            <div class="error-message">
                                <i class="fas fa-exclamation-triangle"></i>
                                <p>${escapeHtml(data.error)}</p>
                            </div>
                        `;
                        showToast('❌', data.error, 'error');
                        return;
                    }
                    
                    currentLeaderboard = data.leaderboard || [];
                    
                    if (currentLeaderboard.length === 0) {
                        tableContent.innerHTML = `
                            <div class="empty-message">
                                <i class="fas fa-chart-simple"></i>
                                <p>Пока нет данных. Пройдите первый сценарий, чтобы попасть в рейтинг!</p>
                                <a href="./app.html" class="btn btn--primary">
                                    <i class="fas fa-play"></i> Начать обучение
                                </a>
                            </div>
                        `;
                        document.getElementById('stats-cards').style.display = 'none';
                        document.getElementById('user-rank-profile').classList.remove('user-rank-profile--visible');
                        return;
                    }
                    
                    // Обновляем статистику
                    updateStats(currentLeaderboard);
                    document.getElementById('stats-cards').style.display = 'grid';
                    
                    // Обновляем профиль пользователя
                    updateUserProfile(currentLeaderboard);
                    
                    // Рендерим таблицу
                    renderLeaderboard(currentLeaderboard);
                    
                    // Обновляем время
                    document.getElementById('update-time').textContent = new Date().toLocaleString();
                    
                    showToast('✅', 'Рейтинги обновлены', 'success');
                    
                } catch (error) {
                    console.error('Ошибка загрузки:', error);
                    tableContent.innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle"></i>
                            <p>Ошибка загрузки рейтингов. Проверьте подключение к интернету.</p>
                            <button class="btn btn--primary" onclick="location.reload()" style="margin-top:12px;">
                                <i class="fas fa-sync-alt"></i> Повторить
                            </button>
                        </div>
                    `;
                    showToast('❌', 'Ошибка загрузки рейтингов', 'error');
                }
                
                refreshBtn.classList.remove('refresh-btn--spinning');
            }
            
            // ===== ОБНОВЛЕНИЕ СТАТИСТИКИ =====
            function updateStats(leaderboard) {
                const totalUsers = leaderboard.length;
                const totalCompleted = leaderboard.reduce((sum, u) => sum + (u.scenariosCompleted || 0), 0);
                const avgPercent = Math.round(leaderboard.reduce((sum, u) => sum + (u.totalPercent || 0), 0) / totalUsers);
                const bestAgent = leaderboard[0]?.name || '—';
                
                document.getElementById('total-users').textContent = totalUsers;
                document.getElementById('total-completed').textContent = totalCompleted;
                document.getElementById('avg-percent').textContent = avgPercent + '%';
                document.getElementById('best-agent').textContent = escapeHtml(bestAgent);
            }
            
            // ===== ОБНОВЛЕНИЕ ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ =====
            function updateUserProfile(leaderboard) {
                const user = getUserData();
                const profileEl = document.getElementById('user-rank-profile');
                
                if (!user) {
                    profileEl.classList.remove('user-rank-profile--visible');
                    return;
                }
                
                // Находим пользователя в рейтинге
                const userEntry = leaderboard.find(u => u.name === user.name);
                const position = userEntry ? leaderboard.indexOf(userEntry) + 1 : null;
                const xpProgress = User.getXPProgress();
                const badges = Badges.getAll();
                
                document.getElementById('profile-avatar').textContent = user.name.charAt(0).toUpperCase();
                document.getElementById('profile-name').textContent = user.name;
                document.getElementById('profile-place').textContent = position ? `Место: ${position}` : 'Место: —';
                document.getElementById('profile-level').textContent = xpProgress.level || '—';
                document.getElementById('profile-xp').textContent = xpProgress.currentXP || '—';
                document.getElementById('profile-percent').textContent = userEntry ? userEntry.totalPercent + '%' : '—%';
                document.getElementById('profile-badges').textContent = badges.length || '—';
                
                profileEl.classList.add('user-rank-profile--visible');
            }
            
            // ===== РЕНДЕР ТАБЛИЦЫ =====
            function renderLeaderboard(leaderboard) {
                const user = getUserData();
                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Место</th>
                                <th>ФИО специалиста</th>
                                <th class="hide-mobile">Результат</th>
                                <th>Сценариев</th>
                                <th class="hide-mobile">Лучший сценарий</th>
                                <th class="hide-mobile">Лучший результат</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                leaderboard.forEach((userData, index) => {
                    const rank = index + 1;
                    const isCurrentUser = user && userData.name === user.name;
                    
                    let rankHTML = '';
                    if (rank === 1) {
                        rankHTML = `<span class="rank-medal rank-medal--1">🥇</span>`;
                    } else if (rank === 2) {
                        rankHTML = `<span class="rank-medal rank-medal--2">🥈</span>`;
                    } else if (rank === 3) {
                        rankHTML = `<span class="rank-medal rank-medal--3">🥉</span>`;
                    } else {
                        rankHTML = `<span class="rank-medal rank-medal--other">${rank}</span>`;
                    }
                    
                    const percentClass = userData.totalPercent < 50 ? 'percent-badge percent-badge--low' : 'percent-badge';
                    
                    tableHTML += `
                        <tr class="${isCurrentUser ? 'user-row' : ''}">
                            <td class="rank-cell">${rankHTML}</td>
                            <td><strong>${escapeHtml(userData.name)}</strong> ${isCurrentUser ? '👤' : ''}</td>
                            <td class="hide-mobile">
                                <span class="${percentClass}">${userData.totalPercent}%</span>
                                <div class="progress-bar-mini">
                                    <div class="progress-bar-mini__fill" style="width: ${userData.totalPercent}%"></div>
                                </div>
                            </td>
                            <td>${userData.scenariosCompleted || 0}</td>
                            <td class="hide-mobile">${escapeHtml(userData.bestScenario || '—')}</td>
                            <td class="hide-mobile">${userData.bestPercent || 0}%</td>
                        </tr>
                    `;
                });
                
                tableHTML += `</tbody></table>`;
                document.getElementById('table-content').innerHTML = tableHTML;
            }
            
            // ===== ОБНОВЛЕНИЕ ПО КНОПКЕ =====
            document.getElementById('refresh-btn')?.addEventListener('click', function(e) {
                e.preventDefault();
                loadLeaderboard();
            });
            
            // ===== ИНИЦИАЛИЗАЦИЯ =====
            function initRatings() {
                // Проверяем, что все зависимости загружены
                if (typeof User === 'undefined' || typeof Badges === 'undefined') {
                    console.warn('[Ratings] Ожидание загрузки модулей...');
                    setTimeout(initRatings, 200);
                    return;
                }

                if (isInitialized) return;
                isInitialized = true;

                console.log('[Ratings] Все модули загружены, загрузка рейтингов...');
                loadLeaderboard();
            }

            // Проверяем, загружен ли AppLoader
            if (typeof AppLoader !== 'undefined') {
                AppLoader.load({
                    debug: false,
                    onComplete: function() {
                        console.log('[Ratings] Общие модули загружены');
                        setTimeout(initRatings, 100);
                    },
                    onError: function(error) {
                        console.error('[Ratings] Ошибка загрузки общих модулей:', error);
                        // Пробуем запустить без общих модулей
                        setTimeout(initRatings, 300);
                    }
                });
            } else {
                // Fallback
                console.warn('[Ratings] AppLoader не найден, запуск без него');
                setTimeout(initRatings, 300);
            }
            
        })();
    </script>
</body>
</html>
