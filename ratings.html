<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Рейтинги — Тренажёр агента недвижимости</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        .ratings-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .ratings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--color-border);
        }
        
        .ratings-header h1 {
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .ratings-header h1 i {
            color: var(--color-primary);
        }
        
        .back-btn {
            text-decoration: none;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        
        .stat-card {
            background: var(--color-surface);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 8px var(--color-shadow);
        }
        
        .stat-card__value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }
        
        .stat-card__label {
            font-size: 0.85rem;
            color: var(--color-text-light);
            margin-top: 8px;
        }
        
        .leaderboard-table {
            background: var(--color-surface);
            border-radius: var(--radius);
            overflow-x: auto;
            box-shadow: 0 2px 8px var(--color-shadow);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        th {
            background: var(--color-bg);
            padding: 16px 12px;
            text-align: left;
            font-weight: 600;
            color: var(--color-text);
            border-bottom: 2px solid var(--color-border);
        }
        
        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text);
        }
        
        tr:hover {
            background: var(--color-bg);
        }
        
        .rank-cell {
            font-weight: 700;
            width: 60px;
            text-align: center;
        }
        
        .rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb300);
            color: #fff;
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
        }
        
        .rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: #fff;
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
        }
        
        .rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b8692a);
            color: #fff;
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
        }
        
        .rank-other {
            background: var(--color-border);
            color: var(--color-text);
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 32px;
            text-align: center;
            border-radius: 50%;
            font-weight: 700;
        }
        
        .percent-badge {
            background: var(--color-success);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--color-text-light);
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .error-message {
            text-align: center;
            padding: 40px;
            color: var(--color-danger);
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: var(--color-text-light);
        }
        
        .refresh-btn {
            margin-left: auto;
        }
        
        @media (max-width: 768px) {
            .ratings-container {
                padding: 16px;
            }
            
            .ratings-header h1 {
                font-size: 1.2rem;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }
            
            .stat-card__value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title"><i class="fas fa-building"></i> Тренажёр агента недвижимости</h1>
            <div class="header__info"></div>
        </header>
        
        <main class="main">
            <div class="ratings-container">
                <div class="ratings-header">
                    <h1>
                        <i class="fas fa-trophy"></i>
                        Рейтинги специалистов
                    </h1>
                    <a href="./" class="btn btn--secondary back-btn">
                        <i class="fas fa-arrow-left"></i> На главную
                    </a>
                </div>
                
                <div class="stats-cards" id="stats-cards" style="display: none;">
                    <div class="stat-card">
                        <div class="stat-card__value" id="total-users">0</div>
                        <div class="stat-card__label">Всего участников</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__value" id="total-completed">0</div>
                        <div class="stat-card__label">Пройдено сценариев</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__value" id="avg-percent">0%</div>
                        <div class="stat-card__label">Средний результат</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-card__value" id="best-agent">—</div>
                        <div class="stat-card__label">Лучший агент</div>
                    </div>
                </div>
                
                <div class="leaderboard-table">
                    <div style="padding: 16px 20px; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center;">
                        <strong><i class="fas fa-chart-line"></i> Таблица лидеров</strong>
                        <button class="btn btn--small btn--secondary" id="refresh-btn" style="padding: 6px 12px;">
                            <i class="fas fa-sync-alt"></i> Обновить
                        </button>
                    </div>
                    <div id="table-content">
                        <div class="loading">
                            <i class="fas fa-spinner"></i>
                            <p>Загрузка рейтингов...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        
        <div class="toast hidden" id="toast">
            <span class="toast__icon" id="toast-icon"></span>
            <span class="toast__message" id="toast-message"></span>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script>
        // Функция для тостов
        function showToast(icon, message, type) {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');
            
            if (!toast) return;
            
            clearTimeout(window.toastTimer);
            toastIcon.textContent = icon;
            toastMessage.textContent = message;
            toast.className = `toast toast--${type} toast--show`;
            window.toastTimer = setTimeout(() => {
                toast.classList.remove('toast--show');
            }, 3000);
        }
        
        // Загрузка рейтингов
        async function loadLeaderboard() {
            const tableContent = document.getElementById('table-content');
            tableContent.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i><p>Загрузка рейтингов...</p></div>';
            
            try {
                const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaderboard`);
                const data = await response.json();
                
                if (data.error) {
                    tableContent.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i><p>${data.error}</p></div>`;
                    showToast('❌', data.error, 'error');
                    return;
                }
                
                if (!data.leaderboard || data.leaderboard.length === 0) {
                    tableContent.innerHTML = '<div class="empty-message"><i class="fas fa-chart-simple"></i><p>Пока нет данных. Пройдите сценарий, чтобы попасть в рейтинг!</p></div>';
                    document.getElementById('stats-cards').style.display = 'none';
                    return;
                }
                
                // Обновляем статистику
                updateStats(data.leaderboard);
                document.getElementById('stats-cards').style.display = 'grid';
                
                // Рендерим таблицу
                let tableHTML = `
                    <table>
                        <thead>
                            <tr>
                                <th>Место</th>
                                <th>ФИО специалиста</th>
                                <th>Общий результат</th>
                                <th>Пройдено сценариев</th>
                                <th>Лучший сценарий</th>
                                <th>Лучший результат</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                data.leaderboard.forEach((user, index) => {
                    const rank = index + 1;
                    let rankClass = 'rank-other';
                    if (rank === 1) rankClass = 'rank-1';
                    else if (rank === 2) rankClass = 'rank-2';
                    else if (rank === 3) rankClass = 'rank-3';
                    
                    tableHTML += `
                        <tr>
                            <td class="rank-cell"><span class="${rankClass}">${rank}</span></td>
                            <td><strong>${escapeHtml(user.name)}</strong></td>
                            <td><span class="percent-badge">${user.totalPercent}%</span> (${user.totalCorrect}/${user.totalItems})</td>
                            <td>${user.scenariosCompleted}</td>
                            <td>${escapeHtml(user.bestScenario || '—')}</td>
                            <td>${user.bestPercent}%</span></td>
                        </tr>
                    `;
                });
                
                tableHTML += `</tbody></table>`;
                tableContent.innerHTML = tableHTML;
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                tableContent.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i><p>Ошибка загрузки рейтингов. Проверьте подключение к интернету.</p></div>`;
                showToast('❌', 'Ошибка загрузки рейтингов', 'error');
            }
        }
        
        function updateStats(leaderboard) {
            const totalUsers = leaderboard.length;
            const totalCompleted = leaderboard.reduce((sum, u) => sum + u.scenariosCompleted, 0);
            const avgPercent = Math.round(leaderboard.reduce((sum, u) => sum + u.totalPercent, 0) / totalUsers);
            const bestAgent = leaderboard[0]?.name || '—';
            
            document.getElementById('total-users').textContent = totalUsers;
            document.getElementById('total-completed').textContent = totalCompleted;
            document.getElementById('avg-percent').textContent = avgPercent + '%';
            document.getElementById('best-agent').textContent = bestAgent;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Обновление по кнопке
        document.getElementById('refresh-btn')?.addEventListener('click', () => {
            loadLeaderboard();
            showToast('🔄', 'Рейтинги обновлены', 'success');
        });
        
        // Загружаем при старте
        loadLeaderboard();
    </script>
</body>
</html>
